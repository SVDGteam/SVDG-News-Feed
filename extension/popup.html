<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>SVDG Hub</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>

    <!-- ── Shared SVDG Hub header ────────────────────────── -->
    <header class="hub-header">
      <div class="hub-logo-badge">
        <img src="icons/icon48.png" alt="SVDG" width="22" height="22" />
      </div>
      <div class="hub-header-text">
        <div class="hub-title">SVDG Hub</div>
        <div class="hub-subtitle">Silicon Valley Defense Group</div>
      </div>
    </header>

    <!-- ── Mode toggle ───────────────────────────────────── -->
    <div class="mode-bar">
      <button class="mode-btn active" id="btn-dispatch">
        <span class="mode-btn-dot dispatch-dot"></span>
        Dispatch
      </button>
      <button class="mode-btn" id="btn-circuit">
        <span class="mode-btn-dot circuit-dot"></span>
        Circuit
      </button>
    </div>

    <!-- ── DISPATCH panel ─────────────────────────────────── -->
    <div id="panel-dispatch">
      <div class="panel-eyebrow dispatch-eyebrow">
        Add article to shared database
      </div>
      <form id="dispatch-form">
        <label>Title<input type="text" id="d-title" required /></label>
        <label>URL<input type="url" id="d-url" required /></label>
        <label>Source<input type="text" id="d-source" placeholder="e.g. Defense News" /></label>
        <label>Description
          <textarea id="d-description" rows="3" placeholder="Short summary or why it matters…"></textarea>
        </label>
        <fieldset id="d-categories">
          <legend>Categories</legend>
        </fieldset>
        <label>Tags <span class="hint">(comma separated)</span>
          <input type="text" id="d-tags" placeholder="AI, Drones, NDAA" />
        </label>
        <button type="submit" id="d-submit">Add to Dispatch</button>
        <p id="d-status" class="status"></p>
        <p class="settings-link"><a href="#" class="open-options">Settings</a></p>
      </form>
    </div>

    <!-- ── CIRCUIT panel ──────────────────────────────────── -->
    <div id="panel-circuit" hidden>
      <div class="panel-eyebrow circuit-eyebrow">
        Add event to calendar
      </div>
      <form id="circuit-form">
        <label>Event title<input type="text" id="c-title" required /></label>
        <label>Event URL<input type="url" id="c-url" required /></label>
        <label>Organizer<input type="text" id="c-organizer" placeholder="e.g. AFCEA" /></label>

        <div class="row-2">
          <label>Start date <span class="required">*</span>
            <input type="date" id="c-startDate" required />
          </label>
          <label>End date
            <input type="date" id="c-endDate" />
          </label>
        </div>

        <div class="row-2">
          <label>Start time
            <input type="time" id="c-startTime" />
          </label>
          <label>End time
            <input type="time" id="c-endTime" />
          </label>
        </div>

        <label>Event type
          <select id="c-eventType">
            <option value="Conference">Conference</option>
            <option value="Summit / Forum">Summit / Forum</option>
            <option value="Pitch / Demo Day">Pitch / Demo Day</option>
            <option value="Networking">Networking</option>
            <option value="Webinar">Webinar</option>
            <option value="Policy / Hearing">Policy / Hearing</option>
            <option value="Workshop / Training">Workshop / Training</option>
            <option value="Award / Deadline">Award / Deadline</option>
            <option value="SVDG Program">SVDG Program</option>
          </select>
        </label>

        <label>Format
          <select id="c-format">
            <option value="In-Person">In-Person</option>
            <option value="Virtual">Virtual</option>
            <option value="Hybrid">Hybrid</option>
          </select>
        </label>

        <label>Location
          <input type="text" id="c-location" placeholder="City, State or 'Virtual'" />
        </label>

        <label>Notes / Why it matters
          <textarea id="c-notes" rows="2" placeholder="Why is this relevant to SVDG?"></textarea>
        </label>

        <button type="submit" id="c-submit" class="circuit-btn">Add to Circuit</button>
        <p id="c-status" class="status"></p>
        <p class="settings-link circuit-settings-link"><a href="#" class="open-options">Settings</a></p>
      </form>
    </div>

  </body>
  <script src="popup.js"></script>
</html>
